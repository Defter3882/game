<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页打砖块小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        /* 游戏画布（适配不同屏幕） */
        #gameCanvas {
            border: 2px solid #4CAF50;
            background: #000;
            max-width: 100%;
            height: auto;
        }
        /* 游戏控制区 */
        .game-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        #score {
            font-size: 20px;
            font-weight: bold;
        }
        /* 移动端虚拟按键 */
        .mobile-buttons {
            display: none;
            gap: 20px;
            margin-top: 15px;
        }
        .mobile-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2196F3;
            font-size: 24px;
        }
        @media (max-width: 768px) {
            .mobile-buttons {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <h1>网页打砖块</h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="game-controls">
        <button id="startBtn">开始游戏</button>
        <span id="score">分数: 0</span>
    </div>
    <!-- 移动端虚拟方向键 -->
    <div class="mobile-buttons">
        <button class="mobile-btn" id="leftBtn">←</button>
        <button class="mobile-btn" id="rightBtn">→</button>
    </div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let paddleX = canvas.width / 2 - 50; // 挡板位置
        const paddleWidth = 100;
        const paddleHeight = 15;
        const ballSize = 10;
        let ballX = canvas.width / 2;
        let ballY = canvas.height - 30;
        let ballSpeedX = 4;
        let ballSpeedY = -4;

        // 砖块配置
        const brickRowCount = 5;
        const brickColumnCount = 8;
        const brickWidth = 70;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 20;
        let bricks = [];

        // 初始化砖块
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        // 绘制挡板
        function drawPaddle() {
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
        }

        // 绘制小球
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
            ctx.fillStyle = '#2196F3';
            ctx.fill();
            ctx.closePath();
        }

        // 绘制砖块
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.fillStyle = '#FF9800';
                        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
                    }
                }
            }
        }

        // 碰撞检测
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (ballX > b.x && ballX < b.x + brickWidth && ballY > b.y && ballY < b.y + brickHeight) {
                            ballSpeedY = -ballSpeedY;
                            b.status = 0;
                            score += 10;
                            scoreElement.textContent = `分数: ${score}`;

                            // 所有砖块打完，重新开始
                            if (score === brickRowCount * brickColumnCount * 10) {
                                alert('恭喜通关！');
                                resetGame();
                            }
                        }
                    }
                }
            }
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (!gameRunning) return;

            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // 小球边界检测（左右）
            if (ballX + ballSpeedX > canvas.width - ballSize || ballX + ballSpeedX < ballSize) {
                ballSpeedX = -ballSpeedX;
            }

            // 小球边界检测（上）
            if (ballY + ballSpeedY < ballSize) {
                ballSpeedY = -ballSpeedY;
            }

            // 小球碰到底部（游戏结束）
            else if (ballY + ballSpeedY > canvas.height - ballSize) {
                if (ballX > paddleX && ballX < paddleX + paddleWidth) {
                    ballSpeedY = -ballSpeedY;
                } else {
                    alert(`游戏结束！分数: ${score}`);
                    resetGame();
                    return;
                }
            }

            // 移动小球
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // 持续绘制
            requestAnimationFrame(draw);
        }

        // 重置游戏
        function resetGame() {
            gameRunning = false;
            score = 0;
            scoreElement.textContent = `分数: ${score}`;
            paddleX = canvas.width / 2 - 50;
            ballX = canvas.width / 2;
            ballY = canvas.height - 30;
            ballSpeedX = 4;
            ballSpeedY = -4;
            initBricks();
            startBtn.textContent = '开始游戏';
        }

        // 开始游戏
        startBtn.addEventListener('click', () => {
            if (gameRunning) {
                resetGame();
            } else {
                gameRunning = true;
                startBtn.textContent = '重新开始';
                draw();
            }
        });

        // 键盘控制挡板
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            // 左箭头
            if (e.key === 'ArrowLeft' && paddleX > 0) {
                paddleX -= 10;
            }
            // 右箭头
            else if (e.key === 'ArrowRight' && paddleX < canvas.width - paddleWidth) {
                paddleX += 10;
            }
        });

        // 移动端按钮控制
        leftBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && paddleX > 0) paddleX -= 10;
        });
        rightBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && paddleX < canvas.width - paddleWidth) paddleX += 10;
        });

        // 初始化
        initBricks();
        draw();
    </script>
</body>
</html>
